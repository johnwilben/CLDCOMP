<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Grades Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1923;color:#e0e0e0;min-height:100vh;padding:24px}
.container{max-width:800px;margin:0 auto}
h1{font-size:28px;color:#fff;margin-bottom:4px}
.student-name{color:#ff9900;font-size:16px;margin-bottom:24px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:#1a2332;border:1px solid #2a3a4a;border-radius:8px;padding:16px;text-align:center}
.stat-card .value{font-size:32px;font-weight:700;color:#ff9900}
.stat-card .label{font-size:12px;color:#888;margin-top:4px}
table{width:100%;border-collapse:collapse;background:#1a2332;border-radius:8px;overflow:hidden}
th{background:#2a3a4a;padding:10px 12px;text-align:left;font-size:13px;color:#ff9900}
td{padding:10px 12px;border-bottom:1px solid #2a3a4a;font-size:14px}
.passed{color:#4caf50;font-weight:700}
.failed{color:#ff4444;font-weight:700}
.loading{text-align:center;color:#888;padding:40px;font-size:16px}
.error{text-align:center;color:#ff4444;padding:40px;font-size:16px}
.footer{margin-top:24px;text-align:center;color:#555;font-size:12px}
</style>
</head>
<body>
<div class="container">
<h1>Student Grades Dashboard</h1>
<p class="student-name"><!-- STUDENT: Replace with your full name -->YOUR NAME HERE</p>

<div class="stats">
<div class="stat-card"><div class="value" id="class-average">-</div><div class="label">Class Average</div></div>
<div class="stat-card"><div class="value" id="passed-count">-</div><div class="label">Passed</div></div>
<div class="stat-card"><div class="value" id="failed-count">-</div><div class="label">Failed</div></div>
</div>

<table>
<thead><tr><th>Student</th><th>Grade</th><th>Remarks</th></tr></thead>
<tbody id="table-body"><tr><td colspan="3" class="loading">Loading grades data...</td></tr></tbody>
</table>

<div class="footer">Powered by AWS S3 + Lambda | Serverless Grades System</div>
</div>

<script>
async function loadData(){
  try{
    const res=await fetch('data/grades.json');
    if(!res.ok)throw new Error('grades.json not found');
    const data=await res.json();

    document.getElementById('class-average').textContent=data.class_average.toFixed(1);
    document.getElementById('passed-count').textContent=data.passed_count;
    document.getElementById('failed-count').textContent=data.failed_count;

    const tbody=document.getElementById('table-body');
    tbody.innerHTML='';
    data.students.forEach(r=>{
      const remarkClass=r.grade>=75?'passed':'failed';
      const remarkText=r.grade>=75?'PASSED':'FAILED';
      tbody.innerHTML+=`<tr><td>${r.name}</td><td>${r.grade}</td><td class="${remarkClass}">${remarkText}</td></tr>`;
    });
  }catch(e){
    document.getElementById('table-body').innerHTML=`<tr><td colspan="3" class="error">Grades not available. Make sure your Lambda function has processed the CSV file correctly.<br><br>Error: ${e.message}</td></tr>`;
  }
}
loadData();
</script>
</body>
</html>
